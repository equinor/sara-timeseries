name: Compile python requirements and create PR
on:
  push:
    branches:
      - main
  workflow_dispatch:

  schedule:
    - cron: "5 6 * * 1-5" # At 06:05 on every day-of-week from Monday through Friday

permissions:
  contents: write
  pull-requests: write

jobs:
  compile-requirements-and-create-pr:
    strategy:
      matrix:
        includes:
          - pyproject_file: pyproject.toml
            output_requirements_file: requirements.txt
          - pyproject_file: timeseries_mock/pyproject.toml
            output_requirements_file: timeseries_mock/requirements-lock.txt
    permissions:
      contents: write
      pull-requests: write
    uses: equinor/armada/.github/workflows/compile_python_requirements_and_create_pr.yml@main
    with:
      pyproject_file: ${{ matrix.pyproject_file }}
      output_requirements_file: ${{ matrix.output_requirements_file }}
