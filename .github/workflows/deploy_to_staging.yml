name: Deploy to Staging

# Only one workflow in a concurrency group may run at a time
concurrency:
  group: staging-concurrency
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  release:
    types: [published]

jobs:
  build-and-push-latest-release-image-to-aurora-dev-container-registry:
    name: Build and push latest release image to aurora dev container registry
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: auroradevacr.azurecr.io
      image_name: robotics/sara-timeseries
      tag: ${{ github.event.release.tag_name }}
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_username: ${{ secrets.ROBOTICS_AURORADEVACR_USERNAME }}
      registry_password: ${{ secrets.ROBOTICS_AURORADEVACR_PASSWORD }}

  build-and-push-latest-release-image-to-github-container-registry:
    name: Build and push latest release image to github container registry
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: ${{ github.event.release.tag_name }}
      secondary_tag: latest
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_username: ${{ github.actor }}
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-latest-release-image-to-aurora-prod-container-registry:
    name: Build and push latest release image to aurora prod container registry
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: auroraprodacr.azurecr.io
      image_name: robotics/sara-timeseries
      tag: ${{ github.event.release.tag_name }}
      secondary_tag: latest
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_username: ${{ secrets.ROBOTICS_AURORAPRODACR_USERNAME }}
      registry_password: ${{ secrets.ROBOTICS_AURORAPRODACR_PASSWORD }}

  update-deployment-in-staging:
    name: Update deployment in Staging
    needs: build-and-push-latest-release-image-to-aurora-prod-container-registry
    uses: equinor/armada/.github/workflows/update_kubernetes_deployment.yml@main
    with:
      environment: staging
      registry: auroraprodacr.azurecr.io
      image_name: robotics/sara-timeseries
      tag: ${{ github.event.release.tag_name }}
      author_name: ${{ github.event.release.author.login }}
      infrastructure_repository: equinor/analytics-infrastructure
    secrets:
      deploy_key: ${{ secrets.ANALYTICS_INFRASTRUCTURE_DEPLOY_KEY }}
