name: Deploy to Development

concurrency:
  group: development-concurrency
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "main"

jobs:
  get-short-sha:
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - id: get-tag
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tag=$SHA_SHORT" >> "$GITHUB_OUTPUT"

  build-and-push-dev-image-to-ghcr:
    name: Build and push dev image to github container registry
    needs: get-short-sha
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image_name: ${{ github.repository }}
      tag: "dev.${{ needs.get-short-sha.outputs.tag }}"
      secondary_tag: dev
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_username: ${{ github.actor }}
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-dev-image-to-aurora-container-registry:
    name: Build and push dev image to aurora container registry
    needs: [get-short-sha]
    uses: equinor/armada/.github/workflows/build_and_publish_docker_image_to_container_registry.yml@main
    permissions:
      contents: read
      packages: write
    with:
      registry: auroradevacr.azurecr.io
      image_name: robotics/sara-timeseries
      tag: "dev.${{ needs.get-short-sha.outputs.tag }}"
      secondary_tag: dev
      path_to_dockerfile: Dockerfile
      path_to_context: .
    secrets:
      registry_username: ${{ secrets.ROBOTICS_AURORADEVACR_USERNAME }}
      registry_password: ${{ secrets.ROBOTICS_AURORADEVACR_PASSWORD }}

  deploy:
    name: Update deployment in Development
    needs: [build-and-push-dev-image-to-aurora-container-registry, get-short-sha]
    uses: ./.github/workflows/update_aurora_deployment.yml
    with:
      Environment: development
      Registry: auroradevacr.azurecr.io
      ImageName: robotics/sara-timeseries
      Tag: "dev.${{ needs.get-short-sha.outputs.tag }}"
      AuthorEmail: ${{ github.event.head_commit.author.email }}
      AuthorName: ${{ github.event.head_commit.author.name }}
    secrets:
      DeployKey: ${{ secrets.ANALYTICS_INFRASTRUCTURE_DEPLOY_KEY }}
